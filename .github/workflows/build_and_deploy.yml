on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4
  
      - name: Get the Latest Front End Workflow Run-Id
        env:
          GH_TOKEN: ${{ github.token }}
        run: $latestRunId = gh api /repos/erikbenton/work-it-out-frontend/actions/runs | jq ".workflow_runs[0].id";
             echo "LATEST_RUN_ID=$latestRunId" >> $GITHUB_ENV;
             
      - name: Check Run-Id
        run: echo "${{ env.LATEST_RUN_ID }}"

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Substitute GitHub Secrets into appsettings
        uses: microsoft/variable-substitution@v1 
        with:
          files: 'WorkoutBackend.Api/appsettings.json'
        env:
          ConnectionStrings.WorkoutDb: ${{ secrets.SQL_CONNECTION_STRING }}

      - name: Download the Front End UI
        uses: actions/download-artifact@v5
        with:
          name: react-app-build
          path: WorkoutBackend.Api/wwwroot
          github-token: ${{ github.token }}
          repository: erikbenton/work-it-out-frontend
          run-id: ${{ env.LATEST_RUN_ID }}

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_89DBBE703EFD4975831F6A7640EC76AB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4DF0B43C2F6F4A1EBBDB87BEE0FAF76C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_305D154CED614A24953E73A50A3DF4C0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'workitout'
          slot-name: 'Production'
          package: .